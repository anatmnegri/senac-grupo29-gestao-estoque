<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque - Sr. Chalino</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 50px; max-width: 800px; }
        .estoque-baixo { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container bg-white p-4 shadow rounded">
        <h2 class="text-center mb-4">Gestão de Estoque - PoC</h2>
        
        <!-- Formulário de Cadastro -->
        <form id="formProduto" class="row g-3 mb-5">
            <div class="col-md-6">
                <input type="text" id="nome" class="form-control" placeholder="Nome do Produto" required>
            </div>
            <div class="col-md-3">
                <input type="number" id="quantidade" class="form-control" placeholder="Qtd" required>
            </div>
            <div class="col-md-3">
                <input type="number" step="0.01" id="preco" class="form-control" placeholder="Preço R$" required>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary w-100">Cadastrar Produto</button>
            </div>
        </form>

        <!-- Tabela de Produtos -->
        <h4>Inventário Atual</h4>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Qtd</th>
                    <th>Preço</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>
    </div>

    <script>
        const form = document.getElementById('formProduto');
        
        // Função para carregar produtos
        async function carregarProdutos() {
            const res = await fetch('/produtos');
            const produtos = await res.json();
            const corpo = document.getElementById('tabelaCorpo');
            corpo.innerHTML = '';
            
            produtos.forEach(p => {
                const status = p.quantidade < 5 ? '<span class="estoque-baixo">Repor!</span>' : 'OK';
                corpo.innerHTML += `
                    <tr>
                        <td>${p.nome}</td>
                        <td>${p.quantidade}</td>
                        <td>R$ ${p.preco.toFixed(2)}</td>
                        <td>${status}</td>
                    </tr>
                `;
            });
        }

        // Função para cadastrar
        form.onsubmit = async (e) => {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('nome').value,
                quantidade: document.getElementById('quantidade').value,
                preco: document.getElementById('preco').value
            };

            await fetch('/produtos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            form.reset();
            carregarProdutos();
        };

        carregarProdutos();
    </script>
</body>
</html>
